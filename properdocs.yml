# ContainerHive Documentation Configuration v1.5.0
# New note styling features:
# - Light theme optimization for kroki diagrams
# - Distinct color schemes for light/dark modes
# - Improved readability and contrast

site_name: ContainerHive
repo_url: https://github.com/timo-reymann/ContainerHive
use_directory_urls: false

theme:
  name: material
  favicon: images/logo.png
  logo: images/logo.png
  icon:
    repo: material/github
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.path
    - navigation.collapse
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
      primary: blue
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      primary: blue
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
      primary: blue

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - decision-records:
      required_deciders_count: 0
  - awesome-nav
  - search
  - kroki:
      file_types:
        - svg
      server_url: https://kroki.io
      fence_prefix: ""
      http_method: "POST"
      styles_light:
        box:
          fill: "#B3D9FF"
          stroke: "#303f9f"
        text:
          fill: "#333333"
          font-family: "Arial"
          font-size: "14"
        line:
          stroke: "#1a237e"
          font-color: "#000"
          label-background: "#333"
        background:
          fill: "transparent"
        note:
          fill: "#fff9c4"
          stroke: "#f57f17"
          color: "#000000"
      styles_dark:
        box:
          fill: "#1a237e"
          stroke: "#303f9f"
        text:
          fill: "#ffffff"
          font-family: "Arial"
          font-size: "14"
        line:
          stroke: "#7986cb"
        background:
          fill: "transparent"
        note:
          fill: "#4e342e"
          stroke: "#ff8f00"
          color: "#ffeb3b"
