name: ORT License Compliance

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  license-check:
    uses: timo-reymann/.github/.github/workflows/ort.yml@main
    with:
      report-formats: PlainTextTemplate,StaticHtml,WebApp
      pre-analyze-command: |
        go version
        make generate
        echo "=== go list stderr ==="
        go list -deps -json=Module -buildvcs=false ./... > /dev/null 2>/tmp/golist-stderr; echo "exit: $?"
        cat /tmp/golist-stderr
