version: '2.1'

parameters:
  update-test-project:
    type: boolean
    default: false

only_tags: &only_tags
  filters:
    branches:
      ignore: /.*/
    tags:
      only: /.*/

orbs:
  github-cli: circleci/github-cli@2.7.2
  docker: circleci/docker@2.8.2
  codecov: codecov/codecov@6.0.0
  go: circleci/go@4.0.0
  github-utils: trustedshops-public/github-utils@1.2.0
  semantic-release: trustedshops-public/semantic-release@6.1.0
  node: circleci/node@7.2.1

executors:
  go:
    docker:
      - image: timoreymann/ci-go:1.26
  python:
    docker:
      - image: cimg/python:3.14
  node:
    docker:
      - image: cimg/python:3.14-node
  schema-nest-cli:
    docker:
      - image: timoreymann/schemanest-cli:v0.8.3

jobs:
  test:
    executor: go
    steps:
      - setup_remote_docker:
          docker_layer_caching: true
      - checkout

      - go/with-cache:
          key: test
          steps:
            - go/mod-download-cached
            - run:
                name: Generate
                command: make generate
            - go/gotestsum:
                coverprofile: coverage.out
                covermode: count
      - codecov/upload:
          files: coverage.out
      - store_artifacts:
          path: coverage.out
  attach-binaries-to-release:
    executor: python
    steps:
      - checkout
      - attach_workspace:
          at: ./
      - github-cli/install:
          version: "2.21.2"
      - run:
          name: Attach binaries to release
          command: |
            gh release upload ${CIRCLE_TAG} dist/*.zst dist/*.zst.sha256
  build-web-report:
    executor: node
    steps:
      - checkout
      - node/install-packages:
          check-cache: always
          pkg-manager: yarn-berry
          app-dir: web/report
      - run:
          name: Build
          command: make build-web-report
      - persist_to_workspace:
          root: ./
          paths:
            - pkg/report/assets/index.html
            - pkg/report/assets/NOTICE
  test-web-report-e2e:
    executor: node
    steps:
      - checkout
      - node/install-packages:
          check-cache: always
          pkg-manager: yarn-berry
          app-dir: web/report
      - run:
          name: Install Playwright browsers
          working_directory: web/report
          command: yarn test:e2e:install
      - run:
          name: Run Playwright e2e tests
          working_directory: web/report
          command: yarn test:e2e
      - store_test_results:
          path: web/report/test-results
      - store_artifacts:
          path: web/report/playwright-report
          destination: playwright-report
  build:
    executor: go
    steps:
      - checkout
      - attach_workspace:
          at: ./
      - go/with-cache:
          key: build
          steps:
            - go/mod-download-cached
            - run:
                name: Build binaries
                command: |
                  make build -j4
                  make pack
            - persist_to_workspace:
                root: ./
                paths:
                  - dist/*.zst
                  - dist/*.zst.sha256
                  - dist/darwin-amd64/ch
                  - dist/darwin-arm64/ch
                  - dist/linux-amd64/ch
                  - dist/linux-arm64/ch
  publish-container-image-snapshot:
    executor: docker/docker
    steps:
      - checkout
      - setup_remote_docker:
          version: default
      - attach_workspace:
          at: ./
      - run:
          name: Build and publish images
          command: |
            export CONTAINER_REGISTRY="ghcr.io/containerhive"
            export VERSION="$(git rev-parse --short HEAD)"
            echo $GITHUB_TOKEN | docker login ghcr.io -u $GITHUB_USER --password-stdin
            docker buildx create --use
            make build-docker
  publish-container-image:
    executor: docker/docker
    steps:
      - checkout
      - attach_workspace:
          at: ./
      - setup_remote_docker:
          version: default
      - run:
          name: Build and publish images
          command: |
            echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker buildx create --use
            make build-docker
      - docker/update-description:
          image: containerhive/containerhive
          docker-username: DOCKER_USERNAME
          docker-password: DOCKER_TOKEN
  upload-schema:
    executor: schema-nest-cli
    steps:
      - checkout
      - run:
          name: Upload image schema to SchemaNest
          command: |
            schema-nest-cli upload-json-schema \
              --base-url https://schema-nest.timo-reymann.de \
              --api-key "$SCHEMA_NEST_UPLOAD_KEY" \
              --version "$CIRCLE_TAG" \
              --path schemas/image.schema.json \
              --identifier containerhive-image
      - run:
          name: Upload project schema to SchemaNest
          command: |
            schema-nest-cli upload-json-schema \
              --base-url https://schema-nest.timo-reymann.de \
              --api-key "$SCHEMA_NEST_UPLOAD_KEY" \
              --version "$CIRCLE_TAG" \
              --path schemas/project.schema.json \
              --identifier containerhive-project
      - run:
          name: Upload structure test schema to SchemaNest
          command: |
            schema-nest-cli upload-json-schema \
              --base-url https://schema-nest.timo-reymann.de \
              --api-key "$SCHEMA_NEST_UPLOAD_KEY" \
              --version "$CIRCLE_TAG" \
              --path schemas/structure-test.schema.json \
              --identifier containerhive-structure-test || true
  build-gh-pages:
    executor: node
    steps:
      - checkout
      - restore_cache:
          key: properdocs-dependencies-{{ checksum "requirements-docs.txt" }}
      - run:
          name: Build properdocs documentation
          command: |
            mkdir gh-pages
            pip install -r requirements-docs.txt
            properdocs build
            mv site/* gh-pages/
            touch gh-pages/.nojekyll
      - save_cache:
          key: properdocs-dependencies-{{ checksum "requirements-docs.txt" }}
          paths:
            - "/tmp/pip-cache"
      - run:
          name: Set up CNAME
          command: |
            echo "container-hive.timo-reymann.de" > gh-pages/CNAME
      - github-utils/publish_github_pages:
          folder: gh-pages/
          git_commit_author_email: "no-reply@timo-reymann.de"
          git_commit_author_name: "CircleCI"
  publish_python_wheel:
    executor: python
    steps:
      - checkout
      - attach_workspace:
          at: .
          name: Retrieve persisted binaries
      - run:
          name: Install dependencies
          command: |
            pip install twine==5.* binary_wheel_builder[cli]>=3.14.0
      - run:
          name: Build wheel
          command: |
            mkdir -p dist/wheel/
            binary-wheel-builder --wheel-spec wheel.yaml --dist-folder dist/wheel/
      - run:
          name: Upload wheel
          command: |
            twine upload -r pypi dist/wheel/*

  update_homebrew_formula:
    executor: python
    steps:
      - attach_workspace:
          at: ./
      - run:
          name: Create new Homebrew formula
          command: |
            git clone https://${GITHUB_TOKEN}@github.com/ContainerHive/homebrew-ContainerHive.git
            cd homebrew-ContainerHive

            python3 ./generate.py \
              --version "${CIRCLE_TAG#v}" \
              --sha256-mac-arm "$(<../dist/darwin-arm64.tar.zst.sha256)" \
              --sha256-mac-amd "$(<../dist/darwin-amd64.tar.zst.sha256)"
            git config --global user.name "CircleCI"
            git config --global user.email no-reply@circleci.com
            git add .
            git commit -m "chore: Update formula for version $CIRCLE_TAG" || true
            git push

  update_pre_commit_repo:
    executor: python
    steps:
      - checkout
      - run:
          name: Update containerhive-pre-commit dependency
          command: |
            VERSION="${CIRCLE_TAG#v}"
            git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/ContainerHive/pre-commit.git"
            cd pre-commit
            git config user.name "CircleCI"
            git config user.email "no-reply@timo-reymann.de"
            python scripts/bump-version.py "${VERSION}"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/ContainerHive/pre-commit.git"
            git push origin main
            git push origin "v${VERSION}"

workflows:
  version: 2
  main:
    when:
      not: << pipeline.parameters.update-test-project >>
    jobs:
      - test
      - build-web-report
      - test-web-report-e2e:
          requires:
            - build-web-report
      - build:
          requires:
            - test
            - build-web-report
            - test-web-report-e2e
      - build-gh-pages:
          filters:
            branches:
              only: main
      - publish-container-image-snapshot:
          requires:
            - build
      - semantic-release/with_existing_config:
          name: semantic-release
          additional_packages: "@google/semantic-release-replace-plugin"
          filters:
            branches:
              only:
                - main
  release:
    jobs:
      - build-web-report:
          <<: *only_tags
      - build:
          <<: *only_tags
          requires:
            - build-web-report
      - attach-binaries-to-release:
          <<: *only_tags
          requires:
            - build
      - publish-container-image:
          requires:
            - build
          <<: *only_tags
      - upload-schema:
          <<: *only_tags
      - update_homebrew_formula:
          <<: *only_tags
          requires:
            - build
            - attach-binaries-to-release
      - update_pre_commit_repo:
          <<: *only_tags
          requires:
            - publish_python_wheel
      - publish_python_wheel:
          <<: *only_tags
          requires:
            - build
