version: '2.1'

parameters:
  update-test-project:
    type: boolean
    default: false

only_tags: &only_tags
  filters:
    branches:
      ignore: /.*/
    tags:
      only: /.*/

orbs:
  github-cli: circleci/github-cli@2.7.2
  docker: circleci/docker@2.8.2
  codecov: codecov/codecov@5.4.3
  go: circleci/go@3.0.4
  github-utils: trustedshops-public/github-utils@1.1.3
  semantic-release: trustedshops-public/semantic-release@6.1.0
  node: circleci/node@7.2.1

executors:
  go:
    docker:
      - image: cimg/go:1.26
  python:
    docker:
      - image: cimg/python:3.14
  node:
    docker:
      - image: cimg/python:3.14-node

jobs:
  test:
    executor: go
    steps:
      - setup_remote_docker:
          docker_layer_caching: true
      - checkout

      - go/with-cache:
          key: test
          steps:
            - go/mod-download-cached
            - run:
                name: Generate
                command: make generate
            - go/gotestsum
      - codecov/upload
      - store_artifacts:
          path: coverage.html
  attach-binaries-to-release:
    executor: python
    steps:
      - checkout
      - attach_workspace:
          at: ./
      - github-cli/install:
          version: "2.21.2"
      - run:
          name: Attach binaries to release
          command: |
            gh release upload ${CIRCLE_TAG} dist/*.zst dist/*.zst.sha256
  build-web-report:
    executor: node
    steps:
      - checkout
      - node/install-packages:
          check-cache: always
          pkg-manager: yarn-berry
          app-dir: web/report
      - run:
          name: Build
          command: make build-web-report
      - persist_to_workspace:
          root: ./
          paths:
            - pkg/report/assets/index.html
            - pkg/report/assets/NOTICE
  build:
    executor: go
    steps:
      - checkout
      - attach_workspace:
          at: ./
      - run:
          name: Install zstd
          command: |
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends zstd
      - go/with-cache:
          key: build
          steps:
            - go/mod-download-cached
            - run:
                name: Build binaries
                command: |
                  make build -j4
                  make pack
            - persist_to_workspace:
                root: ./
                paths:
                  - dist/*.zst
                  - dist/*.zst.sha256
  publish-container-image-snapshot:
    executor: docker/docker
    steps:
      - checkout
      - setup_remote_docker:
          version: default
      - attach_workspace:
          at: ./
      - run:
          name: Build and publish images
          command: |
            export CONTAINER_REGISTRY="ghcr.io/timo-reymann"
            export VERSION="$(git rev-parse --short HEAD)"
            echo $GITHUB_TOKEN | docker login ghcr.io -u timo-reymann --password-stdin
            docker buildx create --use
            make build-docker
  publish-container-image:
    executor: docker/docker
    steps:
      - checkout
      - attach_workspace:
          at: ./
      - setup_remote_docker:
          version: default
      - run:
          name: Build and publish images
          command: |
            echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker buildx create --use
            make build-docker
      - docker/update-description:
          image: timoreymann/containerhive
          docker-username: DOCKER_USERNAME
          docker-password: DOCKER_TOKEN
  update-test-project:
    executor: go
    steps:
      - checkout
      - run:
          name: Check for update-test-project label
          command: |
            if [ -z "$CIRCLE_PULL_REQUEST" ]; then
              echo "Not a PR, skipping"
              circleci-agent step halt
              exit 0
            fi
            PR_NUMBER=$(echo "$CIRCLE_PULL_REQUEST" | grep -oE '[0-9]+$')
            LABELS=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/timo-reymann/ContainerHive/pulls/${PR_NUMBER}" \
              | jq -r '.labels[].name')
            if echo "$LABELS" | grep -q "^update-test-project$"; then
              echo "Label found, proceeding"
            else
              echo "Label not found, skipping"
              circleci-agent step halt
            fi
      - go/with-cache:
          key: update-test-project+-
          steps:
            - go/mod-download-cached
            - run:
                name: Checkout test project
                command: make checkout-test-project
            - run:
                name: Render test project CI
                command: make render-test-project-ci
            - run:
                name: Commit and push changes
                command: |
                  cd test-project
                  git config user.name "CircleCI"
                  git config user.email "no-reply@timo-reymann.de"
                  git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/timo-reymann/ContainerHive-test-project.git
                  git add -A
                  git commit -m "chore: Update CI configuration" || echo "No changes to commit"
                  git push
  build-gh-pages:
    executor: node
    steps:
      - checkout
      - restore_cache:
          key: properdocs-dependencies-{{ checksum "requirements-docs.txt" }}
      - run:
          name: Build properdocs documentation
          command: |
            mkdir gh-pages
            pip install -r requirements-docs.txt
            properdocs build
            mv site/* gh-pages/
            touch gh-pages/.nojekyll
      - run:
          name: Copy schemas
          command: |
            mkdir -p gh-pages/schemas
            cp -r schemas/* gh-pages/schemas/
      - save_cache:
          key: properdocs-dependencies-{{ checksum "requirements-docs.txt" }}
          paths:
            - "/tmp/pip-cache"
      - run:
          name: Set up CNAME
          command: |
            echo "container-hive.timo-reymann.de" > gh-pages/CNAME
      - github-utils/publish_github_pages:
          folder: gh-pages/
          git_commit_author_email: "no-reply@timo-reymann.de"
          git_commit_author_name: "CircleCI"

workflows:
  version: 2
  update-test-project:
    when: << pipeline.parameters.update-test-project >>
    jobs:
      - update-test-project
  main:
    when:
      not: << pipeline.parameters.update-test-project >>
    jobs:
      - update-test-project:
          requires:
            - publish-container-image-snapshot
      - test
      - build-web-report
      - build:
          requires:
            - test
            - build-web-report
      - build-gh-pages:
          filters:
            branches:
              only: main
      - publish-container-image-snapshot:
          requires:
            - build
  #      - semantic-release/with_existing_config:
  #          name: semantic-release
  #          additional_packages: "@google/semantic-release-replace-plugin"
  #          context:
  #            - semantic-release
  #          filters:
  #            branches:
  #              only:
  #                - main
  release:
    jobs:
      - build-web-report:
          <<: *only_tags
      - build:
          <<: *only_tags
          requires:
            - build-web-report
      - attach-binaries-to-release:
          <<: *only_tags
          requires:
            - build
      - publish-container-image:
          requires:
            - build
          <<: *only_tags
